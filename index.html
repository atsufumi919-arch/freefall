<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <title>物理基礎：黒板消し落とし V13（タイミング探究版）</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; display: flex; flex-direction: column; align-items: center; background: #eceff1; color: #333; margin: 0; padding: 20px; }
        .container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 640px; }
        
        .sim-layout { display: flex; gap: 10px; margin-bottom: 10px; align-items: flex-end; }
        #simCanvas { background: #fafafa; border: 1px solid #cfd8dc; border-radius: 4px; }
        .side-panel { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; height: 300px; }
        
        .start-btn { 
            width: 100%; 
            padding: 20px 10px; 
            cursor: pointer; 
            background: #2196f3; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 18px; 
            font-weight: bold; 
            transition: 0.3s;
            box-shadow: 0 4px 6px rgba(33, 150, 243, 0.3);
            margin-bottom: 5px; 
        }
        .start-btn:hover { background: #1976d2; transform: translateY(-2px); }
        .start-btn:active { transform: translateY(0); }

        #graphCanvas { background: #fafafa; border: 1px solid #cfd8dc; border-radius: 4px; display: block; margin-bottom: 10px; }
        
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .control-group { display: flex; flex-direction: column; }
        label { font-size: 13px; font-weight: bold; margin-bottom: 5px; color: #455a64; }
        /* 入力ボックスを少し大きく、目立たせる */
        input { padding: 10px; border: 2px solid #cfd8dc; border-radius: 4px; font-size: 16px; font-weight: bold; }
        input:focus { outline: none; border-color: #2196f3; }
        
        .result-box { grid-column: span 2; text-align: center; height: 30px; line-height: 30px; font-weight: bold; font-size: 18px; border-radius: 4px; }
        .info { grid-column: span 2; font-size: 12px; color: #666; background: #f5f5f5; padding: 10px; border-radius: 4px; line-height: 1.5; }
    </style>
</head>
<body>

    <div class="container">
        <h2 style="text-align:center; margin: 0 0 15px 0;">黒板消し落としシミュレーター</h2>
        
        <div class="sim-layout">
            <canvas id="simCanvas" width="460" height="300"></canvas>
            <div class="side-panel">
                <div id="status" class="result-box"></div>
                <button class="start-btn" onclick="startSimulation()">シミュレーション<br>開始</button>
            </div>
        </div>

        <canvas id="graphCanvas" width="600" height="220"></canvas>
        
        <div class="controls">
            <div class="control-group">
                <label>ドアの高さ (m)</label>
                <input type="number" id="doorHeight" value="2.0" step="0.1">
            </div>
            <div class="control-group">
                <label>生徒の身長 (m)</label>
                <input type="number" id="personHeight" value="1.7" step="0.1">
            </div>
            <div class="control-group">
                <label>ドア下までの到達時間 (s) ※直接入力可</label>
                <input type="number" id="reachTime" value="0.25" step="0.01">
            </div>
            <div class="control-group">
                <label>重力加速度 (m/s²)</label>
                <input type="number" id="g" value="9.8" step="0.1">
            </div>
            <div class="info">
                <strong>探究課題：</strong>到達時間を0.01秒刻みで調整し、「頭（上部10cmの範囲）」にジャストミートする時間を計算して入力してみよう。<br>
                <strong>判定：</strong>頂点〜10cmを「頭」、10cm〜30cmを「顔」、それ以下を「体」とします。
            </div>
        </div>
    </div>

    <script>
        const simCanvas = document.getElementById('simCanvas');
        const sCtx = simCanvas.getContext('2d');
        const graphCanvas = document.getElementById('graphCanvas');
        const gCtx = graphCanvas.getContext('2d');
        
        let animationId;
        let startTime;
        let isHit = false;
        let history = [];

        const personImg = new Image();
        personImg.src = 'person.png'; 

        function getTickStep(range, maxTicks) {
            const roughStep = range / maxTicks;
            const magnitude = Math.pow(10, Math.floor(Math.log10(roughStep)));
            const normalized = roughStep / magnitude;
            let step;
            if (normalized < 1.5) step = 1;
            else if (normalized < 3.5) step = 2;
            else if (normalized < 7.5) step = 5;
            else step = 10;
            return step * magnitude;
        }

        function draw(t, dH, pH, rT, g, isRunning) {
            const waitTime = rT * 0.8;
            const moveTime = rT * 0.2;
            
            let eraserY_m = dH - 0.5 * g * Math.pow(t, 2);
            if (eraserY_m < 0) eraserY_m = 0;

            let personX_ratio = 0;
            if (t > waitTime) {
                personX_ratio = Math.min((t - waitTime) / moveTime, 1.0);
            }

            if (isRunning && t <= rT + 0.5) {
                history.push({ t, eraserY: eraserY_m, personX: personX_ratio });
            }

            sCtx.clearRect(0, 0, simCanvas.width, simCanvas.height);
            
            const maxDrawHeight = simCanvas.height - 40; 
            const scale = maxDrawHeight / Math.max(dH, 2.0);
            const groundY = simCanvas.height - 20;
            const doorX = 320; 
            const doorTopY = groundY - dH * scale;

            sCtx.fillStyle = '#e0e0e0';
            sCtx.fillRect(doorX - 150, doorTopY, 150, dH * scale);
            sCtx.fillStyle = '#8d6e63';
            sCtx.fillRect(doorX - 150, doorTopY - 10, 300, 10);

            let slide = isRunning ? Math.min(t / waitTime, 1) * 80 : 0; 
            sCtx.fillStyle = '#b0bec5';
            sCtx.fillRect(doorX + slide, doorTopY, 110, dH * scale);

            const eY = groundY - eraserY_m * scale;
            sCtx.fillStyle = '#4e342e';
            sCtx.fillRect(doorX - 10, eY - 12, 30, 12);

            const startX = doorX - 60; 
            const targetX = doorX + 5;
            const currentX = startX + (targetX - startX) * personX_ratio;
            const pHeightPx = pH * scale;

            if (personImg.complete && personImg.naturalWidth !== 0) {
                const aspect = personImg.naturalWidth / personImg.naturalHeight;
                const pWidthPx = pHeightPx * aspect; 
                sCtx.save();
                sCtx.translate(currentX, groundY - pHeightPx);
                sCtx.scale(-1, 1);
                sCtx.drawImage(personImg, -pWidthPx / 2, 0, pWidthPx, pHeightPx);
                sCtx.restore();
            } else {
                sCtx.fillStyle = '#1976d2';
                sCtx.fillRect(currentX - 10, groundY - pHeightPx, 20, pHeightPx);
            }

            gCtx.clearRect(0, 0, graphCanvas.width, graphCanvas.height);
            const padL = 50, padR = 20, padT = 20, padB = 40;
            const gW = graphCanvas.width - padL - padR;
            const gH = graphCanvas.height - padT - padB;
            const xMax = Math.max(rT + 0.5, 1.0);
            const yMax = Math.max(dH, 1.0);
            const xStep = getTickStep(xMax, 8);
            const yStep = getTickStep(yMax, 5);

            gCtx.font = "10px Arial";
            gCtx.fillStyle = "#666";
            gCtx.strokeStyle = "#eee";
            
            gCtx.textAlign = "right";
            for (let yv = 0; yv <= yMax; yv += yStep) {
                const py = padT + gH - (yv / yMax) * gH;
                gCtx.beginPath(); gCtx.moveTo(padL, py); gCtx.lineTo(padL + gW, py); gCtx.stroke();
                gCtx.fillText(yv.toFixed(1), padL - 8, py + 3);
            }
            gCtx.textAlign = "center";
            for (let xv = 0; xv <= xMax; xv += xStep) {
                const px = padL + (xv / xMax) * gW;
                gCtx.beginPath(); gCtx.moveTo(px, padT); gCtx.lineTo(px, padT + gH); gCtx.stroke();
                gCtx.fillText(xv.toFixed(1), px, padT + gH + 15);
            }

            gCtx.strokeStyle = '#90a4ae';
            gCtx.strokeRect(padL, padT, gW, gH);

            if (history.length > 1) {
                const getX = (time) => padL + (time / xMax) * gW;
                const getY = (val) => padT + gH - (val / yMax) * gH;
                
                gCtx.strokeStyle = '#2196f3'; gCtx.lineWidth = 2; gCtx.beginPath();
                history.forEach((pt, i) => { if(i===0) gCtx.moveTo(getX(pt.t), getY(pt.eraserY)); else gCtx.lineTo(getX(pt.t), getY(pt.eraserY)); });
                gCtx.stroke();
                
                gCtx.strokeStyle = '#ff9800'; gCtx.beginPath();
                history.forEach((pt, i) => { if(i===0) gCtx.moveTo(getX(pt.t), getY(pt.personX * dH)); else gCtx.lineTo(getX(pt.t), getY(pt.personX * dH)); });
                gCtx.stroke();
            }

            // --- 頭・顔・体の詳細判定処理 ---
            if (isRunning && !isHit) {
                const status = document.getElementById('status');
                const headBottom = pH - 0.1; // 上から10cmまでを「頭」
                const faceBottom = pH - 0.3; // 頭の下から20cmを「顔」

                if (t >= rT) {
                    if (eraserY_m <= pH && eraserY_m > headBottom) {
                        status.innerText = "🎯 頭に直撃！"; 
                        status.style.color = "#d32f2f"; 
                        isHit = true; return false;
                    } else if (eraserY_m <= headBottom && eraserY_m > faceBottom) {
                        status.innerText = "💥 顔に命中！"; 
                        status.style.color = "#f57c00"; 
                        isHit = true; return false;
                    } else if (eraserY_m <= faceBottom && eraserY_m > 0) {
                        status.innerText = "💥 体に命中！"; 
                        status.style.color = "#795548"; 
                        isHit = true; return false;
                    } else if (eraserY_m > pH) {
                        status.innerText = "🏃 回避成功！（上）"; 
                        status.style.color = "#388e3c"; return false;
                    } else {
                        status.innerText = "⌛ 回避成功！（落）"; 
                        status.style.color = "#757575"; return false;
                    }
                }
            }
            return !isHit;
        }

        function startSimulation() {
            cancelAnimationFrame(animationId);
            const dH = parseFloat(document.getElementById('doorHeight').value);
            const pH = parseFloat(document.getElementById('personHeight').value);
            const rT = parseFloat(document.getElementById('reachTime').value);
            const g = parseFloat(document.getElementById('g').value);
            isHit = false; history = [];
            document.getElementById('status').innerText = "実行中...";
            document.getElementById('status').style.color = "#333";
            startTime = performance.now();
            function animate() {
                const now = performance.now();
                const t = (now - startTime) / 1000;
                if (draw(t, dH, pH, rT, g, true) && t < rT + 1) animationId = requestAnimationFrame(animate);
            }
            animate();
        }

        personImg.onload = () => draw(0, 2.0, 1.7, 0.25, 9.8, false);
        window.onload = () => draw(0, 2.0, 1.7, 0.25, 9.8, false);
    </script>
</body>
</html>
